[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["fantasticdevelopper"]
license = "MIT"
repository = "https://github.com/fantasticdevelopper/PySuals"
description = "Python-first frontend framework - compile .pys to optimized JS"
keywords = ["frontend", "framework", "python", "compiler", "wasm"]
categories = ["web-programming", "compilers"]

[workspace.dependencies]
anyhow = "1.0.75"
thiserror = "1.0.50"
serde = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"
tokio = { version = "1.34.0", features = ["full"] }
regex = "1.10.2"
once_cell = "1.19.0"
colored = "2.0.4"
sha2 = "0.10.8"
base64 = "0.21.5"
bincode = "1.3.3"
wasm-bindgen = "0.2.89"
js-sys = "0.3.66"
console_error_panic_hook = "0.1.7"
serde-wasm-bindgen = "0.6.5"
clap = { version = "4.4.11", features = ["derive"] }
glob = "0.3.1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
debug = true

[patch.crates-io]
# Local overrides if needed
